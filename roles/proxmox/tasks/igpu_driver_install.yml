---
- name: "Get Proxmox Kernel Version"
  ansible.builtin.command:
    cmd: "uname -r"
  register: proxmox_kernel_version
  changed_when: false

- name: "Install Xe Driver Dependency Pkgs"
  ansible.builtin.apt:
    pkg:
      - "proxmox-headers-{{ proxmox_kernel_version.stdout }}"
      - build-essential
      - dkms
      - mokutil
      - sysfsutils
      - vainfo
    state: present

- name: "Install Xe Driver Dependency Kernel(Unsigned) for Proxmox"
  ansible.builtin.apt:
    pkg:
      - "proxmox-default-headers"
      - "proxmox-default-kernel"
    state: present
  when: proxmox_vfs_kernel is defined

# https://github.com/strongtz/i915-sriov-dkms?tab=readme-ov-file#required-kernel-parameters
- name: "Configure VFs for Proxmox (Xe)"
  notify:
    - "Run update-grub"
    - "Run update-initramfs"
    - "Restart sysfsutils"
  block:
    - name: "Get device id"
      ansible.builtin.command:
        cmd: cat /sys/devices/pci0000:00/0000:00:02.0/device
      register: device_id
      changed_when: false
      when:
        - not ansible_check_mode

    - name: "Edit Configures Ini files (Xe)"
      community.general.ini_file:
        path: "{{ item.path }}"
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        state: present
        no_extra_spaces: true
        mode: "644"
      loop:
        - path: "/etc/sysfs.conf"
          option: "devices/pci0000:00/0000:00:02.0/sriov_numvfs"
          value: "2"
        - path: /etc/default/grub
          option: "GRUB_CMDLINE_LINUX_DEFAULT"
          value: '"quiet intel_iommu=on xe.max_vfs=2 xe.force_probe={{ device_id.stdout }} module_blacklist=i915"'

    - name: "Edit blacklist.conf (i915)"
      ansible.builtin.lineinfile:
        path: "/etc/modprobe.d/blacklist.conf"
        line: "blacklist i915"
        state: present
        create: true
        mode: "644"

    - name: "Waiting method"
      block:
        - name: "Create Waiting Scripts dir"
          ansible.builtin.file:
            path: "/etc/systemd/system/sysfsutils.service.d"
            state: directory
            owner: root
            group: root
            mode: '0755'

        - name: "Create Waiting Script"
          community.general.ini_file:
            path: "/etc/systemd/system/sysfsutils.service.d/delay.conf"
            section: "Service"
            option: "ExecStartPre"
            value: "/bin/sleep 5"
            state: present
            no_extra_spaces: true
            mode: "644"

- name: "Download i915 Driver"
  ansible.builtin.get_url:
    url: "{{ proxmox_i915_driver_url }}"
    dest: "{{ proxmox_i915_driver_dest }}"
    checksum: "{{ proxmox_i915_driver_checksum }}"
    mode: '0600'

- name: "Install i915 Driver"
  ansible.builtin.apt:
    deb: "{{ proxmox_i915_driver_dest }}"
    state: present
  notify:
    - "Run update-grub"
    - "Run update-initramfs"
