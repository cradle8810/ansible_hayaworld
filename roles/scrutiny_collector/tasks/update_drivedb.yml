---
- name: Check DriveDB updated flag
  ansible.builtin.stat:
    path: "/var/lib/smartmontools/drivedb/7.5"
  register: drivedb

- name: "Update DriveDB"
  when: drivedb.stat.exists is false
  block:
    - name: "Remove DriveDB dir"
      ansible.builtin.file:
        path: "/var/lib/smartmontools/drivedb"
        state: absent

    - name: "ReCreate DriveDB dir"
      ansible.builtin.file:
        path: "/var/lib/smartmontools/drivedb"
        state: directory
        owner: "root"
        group: "root"
        mode: '0755'

    - name: "Get DriveDB 7.5"
      ansible.builtin.get_url:
        url: "https://sourceforge.net/p/smartmontools/code/HEAD/tree/branches/RELEASE_7_5_DRIVEDB/smartmontools/drivedb.h?format=raw"
        dest: "/var/lib/smartmontools/drivedb/drivedb.h"
        checksum: "sha256:cd5d34d9d618e09e8cba83b25556a7b9bd3fc81bb7917d8585b5f0544d729a6f"
        owner: root
        group: root
        mode: "0644"

    - name: "Touch updated flag"
      ansible.builtin.file:
        path: "/var/lib/smartmontools/drivedb/7.5"
        state: touch
        owner: "root"
        group: "root"
        mode: '0644'
