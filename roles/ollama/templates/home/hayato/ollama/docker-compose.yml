services:
  ollama:
    image: ollama/ollama:0.30.0-rc27
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
      - /home/hayato/Models:/root/Models:ro
    devices:
      - /dev/dri:/dev/dri
    environment:
      - OLLAMA_VULKAN=1
      - OLLAMA_ORIGINS="*"
      - OLLAMA_INTEL_GPU=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_FLASH_ATTENTION=false
      - OLLAMA_IGPU_ENABLE=true
    restart: unless-stopped

volumes:
  ollama:
