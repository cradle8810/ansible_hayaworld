services:
  ollama:
    image: ollama/ollama@sha256:a5f42ba1af98f623a341f9f13140abce6b8ad2eacdc618338771aceb81b08668
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
      - /home/hayato/Models:/root/Models:ro
    devices:
      - /dev/dri:/dev/dri
    environment:
      - OLLAMA_VULKAN=1
      - OLLAMA_ORIGINS="*"
      - OLLAMA_INTEL_GPU=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_FLASH_ATTENTION=false
      - OLLAMA_IGPU_ENABLE=true
      - OLLAMA_KEEP_ALIVE="-1"
    restart: unless-stopped

  tika:
    image: apache/tika:latest-full
    container_name: tika
    ports:
      - 9998:9998
    restart: unless-stopped

volumes:
  ollama:
