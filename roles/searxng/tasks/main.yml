---
- name: "Install Docker"
  ansible.builtin.include_role:
    name: docker

- name: "Put docker-compose.yml"
  tags:
    - docker
    - compose
  block:
    - name: "Mkdir for searxng docker-compose"
      ansible.builtin.file:
        path: "/root/searxng"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: "Put searxng docker-compose"
      ansible.builtin.copy:
        src: "roles/searxng/templates/root/searxng/docker-compose.yml"
        dest: "/root/searxng/docker-compose.yml"
        owner: root
        group: root
        mode: '0644'
      notify: "Up searxng container"

- name: "Setup Tailscale Endpoint"
  ansible.builtin.include_role:
    name: tailscale_install
    apply:
      tags:
        - tailscale
  tags:
    - tailscale
