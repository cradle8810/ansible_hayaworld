---
- name: "Mount Skylark / Install dependency Cifs-utils"
  ansible.builtin.apt:
    name: "cifs-utils"
    state: present
    update_cache: true

- name: "Mount Skylark / Create Mountpoint dir"
  ansible.builtin.file:
    path: "{{ mount_dest_path }}"
    state: directory
    owner: "{{ mount_dest_dir_owner }}"
    group: "{{ mount_dest_dir_group }}"
    mode: '0755'

- name: "Mount Skylark / Create credential dir"
  ansible.builtin.file:
    path: "/etc/samba/"
    state: directory
    owner: "root"
    group: "root"
    mode: '0755'

- name: "Mount Skylark / Copy credential file"
  ansible.builtin.template:
    src: templates/etc/samba/credentials.j2
    dest: /etc/samba/credentials
    owner: root
    group: root
    mode: '0600'

- name: "Mount Skylark / Mount skylark"
  ansible.posix.mount:
    src: "//{{ mount_skylark_ipv4 }}/{{ mount_src_path }}"
    path: "{{ mount_dest_path }}"
    opts: "{{ mount_opts_base }},{{ mount_opts_additional }}"
    fstype: cifs
    state: mounted
