---
- name: "GPU / Configure GRUB CMDLINE"
  community.general.ini_file:
    path: /etc/default/grub
    option: "GRUB_CMDLINE_LINUX_DEFAULT"
    value: '"i915.enable_guc=3"'
    state: present
    no_extra_spaces: true
    mode: "644"
  notify:
    - "Run update-grub"
    - "Run update-initramfs"
    - "Echo reboot notice"

- name: "GPU / Install GPU Utilities"
  ansible.builtin.apt:
    pkg:
      - libmfx-gen-dev
      - libva-dev
      - vainfo
      - mesa-utils
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: "GPU / Integrated GPU Permission Fix"
  ansible.builtin.copy:
    src: templates/all/etc/udev/rules.d/99-render.rules
    dest: /etc/udev/rules.d/99-render.rules
    owner: root
    group: root
    mode: '0644'

- name: "GPU / Append render group for root"
  ansible.builtin.user:
    name: "root"
    uid: 0
    groups:
      - render
    append: true

- name: "GPU / Install Requirements"
  ansible.builtin.apt:
    pkg:
      - build-essential
      - dkms
      - linux-image-generic-hwe-{{ ansible_facts["distribution_version"] }}
      - linux-headers-generic-hwe-{{ ansible_facts["distribution_version"] }}
    state: present
    update_cache: true

- name: "GPU / Download i915 Driver"
  ansible.builtin.get_url:
    url: "{{ igpu_i915_driver_url }}"
    dest: "{{ igpu_i915_driver_dest }}"
    checksum: "{{ igpu_i915_driver_checksum }}"
    mode: '0600'

- name: "GPU / Install i915 Driver"
  ansible.builtin.apt:
    deb: "{{ igpu_i915_driver_dest }}"
    state: present
  notify:
    - "Run update-grub"
    - "Run update-initramfs"
    - "Echo reboot notice"
