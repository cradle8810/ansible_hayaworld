services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    container_name: open-webui
    ports:
      - "8080:8080"
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - open-webui:/app/backend/data
    env_file:
      - environment.txt
    environment:
  # https://docs.openwebui.com/reference/env-configuration/
#      ENABLE_PERSISTENT_CONFIG: false
#      RESET_CONFIG_ON_START: true
      TITLE_GENERATION_PROMPT_TEMPLATE:  |2
        ### Task:
        Summarize this chat in about 20 characters in Japanese, without emojis.

        ### Guidelines:
        - Consider the content of the chat so that it can be distinguished from other chats.
        - DON'T USE emojis, quotation marks or special formatting.
        - Write the title in Japanese.

        ### Output:
        JSON format={ "title"="your concise title here" }

        ### Example:
        JSON format={ "title"="タイトルの例 できるだけ詳しく" }

        ### Chat History:
        <chat_history>
          {{MESSAGES:END:8}}
        </chat_history>
      TAGS_GENERATION_PROMPT_TEMPLATE: |2
        ### Task:
        Generate 1-10 broad tags categorizing the main themes of the chat history, along with 1-10 more specific subtopic tags.

        ### Guidelines:
        - Start with high-level domains (e.g., Science, Technology, Philosophy, Arts, Politics, Business, Health, Sports, Entertainment, Education)
        - Consider including relevant subfields/subdomains if they are strongly represented throughout the conversation
        - If content is too short (less than 3 messages) or too diverse, use only ["General"]
        - Use English only
        - Prioritize accuracy over specificity

        ### Output:
        JSON format={ "tags"=["tag1", "tag2", "tag3"] }

        ### Chat History:
        <chat_history>
          {{MESSAGES:END:6}}
        </chat_history>
      DEFAULT_QUERY_GENERATION_PROMPT_TEMPLATE: |2
        ### Task:
        Analyze the chat history to determine the necessity of generating search queries, in the given language. By default, **prioritize generating 1-3 broad and relevant search queries** unless it is absolutely certain that no additional information is required. The aim is to retrieve comprehensive, updated, and valuable information even with minimal uncertainty. If no search is unequivocally needed, return an empty list.

        ### Guidelines:
        - OUTPUT JSON QUERIES MUST BE JAPANESE. 検索クエリは日本語で必ず返すこと。
        - Respond **EXCLUSIVELY** with a JSON object. Any form of extra commentary, explanation, or additional text is strictly prohibited.
        - When generating search queries, respond in the format: { "queries": ["クエリ1", "クエリ2"] }, ensuring each query is distinct, concise, and relevant to the topic.
        - If and only if it is entirely certain that no useful results can be retrieved by a search, return: { "queries": [] }.
        - Err on the side of suggesting search queries if there is **any chance** they might provide useful or updated information.
        - Be concise and focused on composing high-quality search queries, avoiding unnecessary elaboration, commentary, or assumptions.
        - Today's date is: {{CURRENT_DATE}}.
        - Always prioritize providing actionable and broad queries that maximize informational coverage.

        ### Output:
        Strictly return in JSON format: 
        {
          "queries": ["クエリ1", "クエリ2"]
        }

        ### Chat History:
        <chat_history>
        {{MESSAGES:END:4}}
        </chat_history>
    restart: unless-stopped
    deploy:
      resources:
        limits:
          pids: 65535
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535

volumes:
  open-webui:

networks:
  default:
    enable_ipv6: true
