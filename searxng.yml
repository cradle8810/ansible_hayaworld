- name: Play for searxng web search
  hosts: searxng
  remote_user: ansible
  gather_facts: true
  become: true

  vars_files:
    - host_vars/networks.yml

  handlers:
    - name: Restart handler tasks
      ansible.builtin.import_tasks:
        file: handlers/main.yml

  tasks:
    - name: Common Settings
      ansible.builtin.import_role:
        name: common
      vars:
        common_firewall: "{{ firewall }}"
        common_install_users: true

    - name: Install ShortStory Store
      ansible.builtin.import_role:
        name: searxng
      tags:
        - searxng
        - search
        - searching

    - name: "Install firecrawl"
      ansible.builtin.import_role:
        name: firecrawl
      vars:
        docker_install: false
        tailscale_install: false
      tags:
        - firecrawl

    - name: "Install BorgBackup and Configuration Backup"
      ansible.builtin.import_role:
        name: borg
      tags:
        - borg

    - name: Install/Config Zramswap
      ansible.builtin.import_role:
        name: zramswap
      tags:
        - zram
