---
- name: Restart avahi-daemon
  ansible.builtin.systemd_service:
    name: avahi-daemon
    state: restarted
  listen: "Restart avahi-daemon"

- name: Restart rsyslog
  ansible.builtin.systemd_service:
    name: rsyslog
    state: restarted
  listen: "Restart rsyslog"

- name: Restart systemd-journald
  ansible.builtin.systemd_service:
    name: systemd-journald
    state: restarted
  listen: "Restart systemd-journald"

- name: Restart multipathd
  ansible.builtin.systemd_service:
    name: multipathd
    state: restarted
  listen: "Restart multipathd"

- name: "Restart systemd-resolved.service"
  ansible.builtin.systemd_service:
    name: systemd-resolved.service
    state: restarted
    enabled: true
  listen: "Restart systemd-resolved"

- name: "Reconfigure netplan"
  ansible.builtin.command:
    cmd: "netplan apply -f"
  register: retval
  changed_when: retval.rc == 0
  listen: "Reconfigure netplan"

- name: "Swappiness setting for nuc sysctl restart"
  ansible.builtin.command:
    cmd: "sysctl -p /etc/sysctl.d/00-localbind.conf"
  register: retval
  changed_when: retval.rc == 0
  listen: "localbind sysctl"

- name: "Restart ksmtuned"
  ansible.builtin.systemd_service:
    name: hdd_prevent_sleeping.service
    state: restarted
    enabled: true
  listen: "hdd_prevent_sleeping"

- name: "Restart NGiNX"
  ansible.builtin.systemd_service:
    name: nginx.service
    state: restarted
    enabled: true
  listen: "Restart NGiNX"

- name: "Restart cron"
  ansible.builtin.systemd_service:
    name: cron.service
    state: restarted
    enabled: true
  listen: "Restart cron"

- name: Restart zabbix-agent2
  ansible.builtin.systemd_service:
    name: zabbix-agent2
    state: restarted
    enabled: true
    daemon_reload: true
  listen: "Restart zabbix-agent2"

- name: Restart snmpd
  ansible.builtin.systemd_service:
    name: zabbix-agent2
    state: restarted
    enabled: true
    daemon_reload: true
  listen: "Restart snmpd"

- name: "Common / Reload sysctl"
  ansible.builtin.command:
    cmd: "sysctl -p"
  register: retval
  changed_when: retval.rc == 0
  listen: "Reload sysctl"

- name: "Enable Huge Page setting for nuc sysctl restart"
  ansible.builtin.command:
    cmd: "sysctl -p /etc/sysctl.d/99-hugepage.conf"
  register: retval
  changed_when: retval.rc == 0
  listen: "hugepage sysctl"

- name: "Initialize Borgbackup destination dir"
  ansible.builtin.command:
    cmd: "locale-gen ja_JP.UTF-8"
  register: retval
  changed_when: retval.rc == 0
  listen: "locale gen for skylark"
