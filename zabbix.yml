---
- name: Play for Zabbix
  hosts: watch
  remote_user: root
  gather_facts: true
  become: true

  vars_files:
    - host_vars/networks.yml

  handlers:
    - name: Restart handler tasks
      ansible.builtin.import_tasks:
        file: handlers/main.yml

  tasks:
    - name: Common Settings
      ansible.builtin.import_role:
        name: common
      vars:
        common_firewall: "{{ firewall }}"
        common_pkg: "{{ apt }}"
        common_install_users: true

    - name: Common Settings
      ansible.builtin.import_role:
        name: zabbix

    - name: APC UPS Settings
      ansible.builtin.import_role:
        name: apcupsd
      vars:
        apcupsd_role: "slave"
        apcupsd_timeout: 60
      tags:
        - apc
        - ups

    - name: "Configure Rsyslog"
      ansible.builtin.import_role:
        name: rsyslog_client
      vars:
        rsyslog_client_additional_actions: "{{ rsyslog.rsyslog_client_additional_actions }}"
        rsyslog_client_journald_persistent: false
      tags:
        - rsyslog

    - name: "Setup Tailscale Endpoint"
      ansible.builtin.include_role:
        name: tailscale_install
        apply:
          tags:
            - tailscale
      vars:
        tailscale_install_tags:
          - zabbix
        tailscale_install_serve: true
        tailscale_install_funnel: true
        tailscale_install_serve_https_port: 443
        tailscale_install_serve_set_path: "/"
        tailscale_install_serve_url: "http://127.0.0.1:8443"
      tags:
        - tailscale

    - name: Install Zabbix agent
      ansible.builtin.import_tasks:
        file: tasks/zabbix-agent2.yml
      tags:
        - zabbix

    - name: Install/Config Zramswap
      ansible.builtin.import_role:
        name: zramswap
      tags:
        - zram
