---
- name: Play for AI base VM
  hosts: llama
  remote_user: ansible
  gather_facts: true
  become: true

  vars_files:
    - host_vars/networks.yml

  handlers:
    - name: Restart handler tasks
      ansible.builtin.import_tasks:
        file: handlers/main.yml

  tasks:
    - name: Common Settings
      ansible.builtin.import_role:
        name: common
      vars:
        common_firewall: "{{ firewall }}"
        common_install_users: true

    # https://vulkan.lunarg.com/sdk/home#linux
    - name: "Install iGPU Relational things"
      ansible.builtin.import_role:
        name: igpu
      vars:
        igpu_kernel_install: false
        igpu_vulkan_install: true
      tags:
        - igpu
        - vulkan

    - name: "Install Vim"
      ansible.builtin.apt:
        pkg: vim
        state: present
        update_cache: true

    - name: "Install llama"
      ansible.builtin.import_role:
        name: llama-swap
      tags:
        - llama

    - name: "Install BorgBackup and Configuration Backup"
      ansible.builtin.import_role:
        name: borg
      vars:
        borg_device: "/mnt/backup/Service_Backups/llama-swap"
        borg_sources:
          - src: llama-swap_models
            dest: llama-swap_models
          - src: /home/hayato/llama
            dest: llama
      tags:
        - borg

    - name: Install Zabbix agent
      ansible.builtin.import_tasks:
        file: tasks/zabbix-agent2.yml
      tags:
        - zabbix

    - name: "Mount skylark Model Dir"
      tags:
        - skylark
      ansible.builtin.import_role:
        name: mount_skylark
      vars:
        mount_src_path: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          30666333616462666433356131626538376632343632376234636535343963313432613237633136
          3365356462616436326230316634386137363135376565320a366565343332333731303938623764
          39613338393161303863616237313931633432303562666264346362663261613836646135346532
          3135356338343038310a353566323431363261303635623537363161616131393466623965346163
          34333066313333386366346563393562383864383266363630323466663831326165
        mount_dest_path: "/home/hayato/Models"
        mount_opts_additional: "ro"
        mount_uid: "{{ user | selectattr('name', 'eq', 'hayato') | map(attribute='uid') | first }}"
        mount_gid: "{{ user | selectattr('name', 'eq', 'hayato') | map(attribute='gid') | first }}"

    - name: Install/Config Zramswap
      ansible.builtin.import_role:
        name: zramswap
      tags:
        - zram

    - name: "Enable Huge Pages"
      community.general.ini_file:
        path: "/etc/sysctl.d/99-hugepage.conf"
        option: "{{ item.option }}"
        value: "{{ item.value }}"
        state: present
        no_extra_spaces: true
        mode: "644"
      loop:
        - option: "vm.max_map_count"
          value: "262144" # 2MiB Chunk
      notify: "hugepage sysctl"
      tags:
        - zram

    - name: "Configure Rsyslog"
      ansible.builtin.import_role:
        name: rsyslog_client
      tags:
        - rsyslog
