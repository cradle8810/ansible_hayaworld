- name: Play for pihole upstream servers
  hosts: piholes
  remote_user: root
  gather_facts: true
  become: true

  vars_files:
    - host_vars/networks.yml

  handlers:
    - name: Restart handler tasks
      ansible.builtin.import_tasks:
        file: handlers/main.yml

  tasks:
    - name: Common Settings
      ansible.builtin.import_role:
        name: common
      vars:
        common_firewall: "{{ firewall }}"
        common_install_users: false
        common_install_langs: true
        common_network_nameserver_addresses:
          - "202.232.2.3"
          - "202.232.2.2"

    - name: "Setup dnsmasq"
      ansible.builtin.import_role:
        name: pihole
      tags:
        - docker
        - pihole
        - dns

    - name: "Setup Tailscale Endpoint"
      ansible.builtin.import_role:
        name: tailscale_install
      vars:
        tailscale_install_tags:
          - dns
        tailscale_install_serve: true
        tailscale_install_funnel: false
        tailscale_install_serve_https_port: 443
        tailscale_install_serve_set_path: "/"
        tailscale_install_serve_url: "http://127.0.0.1:80"
        tailscale_install_args: "--accept-dns=true"
      tags:
        - tailscale

    - name: Install Zabbix agent
      ansible.builtin.import_tasks:
        file: tasks/zabbix-agent2.yml
      tags:
        - zabbix

    - name: Install/Config Zramswap
      ansible.builtin.import_role:
        name: zramswap
      tags:
        - zram
