---
- name: "Common / Set to don't use DNSStubListener for systemd config"
  community.general.ini_file:
    path: "/etc/sysctl.d/99-tailscale.conf"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    state: present
    no_extra_spaces: false
    mode: "644"
  notify: "tailscale sysctl"
  loop:
    - option: "net.ipv4.ip_forward"
      value: "1"
    - option: "net.ipv6.conf.all.forwarding"
      value: "1"

- name: "Setup Tailscale Endpoint"
  ansible.builtin.import_role:
    name: artis3n.tailscale.machine
  tags:
    - tailscale
  when: not ansible_check_mode
  vars:
    tailscale_authkey: "{{ tailscale.client_secret }}"
    tailscale_args: "--advertise-routes=192.168.88.0/24 --advertise-exit-node --accept-dns=false"
    tailscale_oauth_ephemeral: false
    tailscale_tags:
      - gw

- name: "Tailscale Firewall accept"
  community.general.ufw:
    rule: allow
    interface_in: tailscale0
    proto: any

# tailscale_serve_retval == 0 when not configured
- name: "Check Tailscale serve configured"
  ansible.builtin.shell:
    cmd: |
        set -o pipefail
        tailscale serve status | grep 'No serve config'
    executable: /bin/bash
  register: tailscale_serve_retval
  changed_when: tailscale_serve_retval.rc == 0
  failed_when: tailscale_serve_retval.rc != 0 and tailscale_serve_retval.rc != 1
  when: not ansible_check_mode

# This node doesn't need to reveal WebUI to the Internet.
- name: "Set Tailscale serve"
  ansible.builtin.command:
    cmd: tailscale serve --bg --https=443 --set-path=/ http://127.0.0.1:80
  register: retval
  changed_when: retval.rc == 0
  when:
    - not ansible_check_mode
    - tailscale_serve_retval.rc == 0
