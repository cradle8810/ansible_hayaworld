---
- name: Zabbix-agent2 repository install
  ansible.builtin.apt:
    deb: "https://repo.zabbix.com/zabbix/7.4/release/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu{{ ansible_facts['lsb']['release'] }}_all.deb"
  when: common_hostinfo.proxmox is undefined

- name: Zabbix-agent2 install
  ansible.builtin.apt:
    pkg:
      - zabbix-agent2
    update_cache: true

- name: Configure zabbix-agent2.conf
  community.general.ini_file:
    path: "/etc/zabbix/zabbix_agent2.conf"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    state: present
    no_extra_spaces: true
    mode: "644"
  notify: "Restart zabbix-agent2"
  loop:
    - option: "LogFileSize"
      value: "50"
    - option: "Server"
      value: "zabbix.hayaworld.home"
    - option: "ServerActive"
      value: "{{ common_hostinfo.shortname }}.hayaworld.home"
    - option: "Hostname"
      value: "{{ common_hostinfo.shortname }}.hayaworld.home"
    - option: "AllowKey"
      value: "system.run[echo*]"
    - option: "LogFile"
      value: "/var/log/zabbix_agent2.log"
    - option: "LogType"
      value: "system"

- name: Make zabbix-agent dropin dir
  notify: "Restart zabbix-agent2"
  ansible.builtin.file:
    path: "/etc/systemd/system/zabbix-agent2.service.d/"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Make zabbix-agent dropin Configure
  community.general.ini_file:
    path: "/etc/systemd/system/zabbix-agent2.service.d/override.conf"
    section: "Service"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    state: present
    no_extra_spaces: true
    mode: "644"
  notify: "Restart zabbix-agent2"
  loop:
    - option: "User"
      value: "root"
    - option: "Group"
      value: "root"
