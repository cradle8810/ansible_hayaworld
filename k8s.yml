- name: Play for k8s cluster nodes
  hosts: k8s
  remote_user: ansible
  gather_facts: true
  become: true

  vars_files:
    - host_vars/networks.yml

  handlers:
    - name: Restart handler tasks
      ansible.builtin.import_tasks:
        file: handlers/main.yml

  tasks:
    - name: Common Settings
      ansible.builtin.import_role:
        name: common
      vars:
        common_firewall: "{{ firewall }}"
        common_install_users: true

    - name: "Setup Tailscale Endpoint"
      ansible.builtin.import_role:
        name: tailscale_install
      vars:
        tailscale_install_tags:
          - k8s
        tailscale_install_args: "--accept-dns=true"
      tags:
        - tailscale

    - name: Install Containerd
      ansible.builtin.include_role:
        name: containerd
        apply:
          tags:
            - containerd
      vars:
        containerd_drive_is_opt_docker: true
        containerd_btrfs: true
        containerd_drive_uuid: "397a73b4-c584-4a22-a093-15df469b5360"
      tags:
        - containerd

    - name: Install k8s
      ansible.builtin.include_role:
        name: geerlingguy.kubernetes
        apply:
          tags:
            - k8s
      vars:
        kubernetes_allow_pods_on_control_plane: true
      tags:
        - k8s

    - name: Install helm
      ansible.builtin.include_role:
        name: geerlingguy.helm
        apply:
          tags:
            - k8s
            - helm
      vars:
        helm_version: 'v3.21.2'
      tags:
        - k8s
        - helm

    - name: "Install Tailscale Helm chart"
      when: inventory_hostname == 'k01'
      ansible.builtin.shell:
        cmd: |
          set -o pipefail &&
          helm repo add tailscale https://pkgs.tailscale.com/helmcharts &&
          helm repo update &&
          helm upgrade \
            --install \
            tailscale-operator \
            tailscale/tailscale-operator \
            --namespace=tailscale \
            --create-namespace \
            --set-string oauth.clientId="{{ OAUTH_CLIENT_ID }}" \
            --set-string oauth.clientSecret="{{ OAUTH_CLIENT_SECRET }}" \
      register: tailscale_helm_install
      changed_when: tailscale_helm_install.rc != 0
      tags:
        - k8s
        - helm

    - name: APC UPS Settings
      ansible.builtin.import_role:
        name: apcupsd
      vars:
        apcupsd_role: "slave"
        apcupsd_timeout: 60
      tags:
        - apc
        - ups

    - name: "Configure Rsyslog"
      ansible.builtin.import_role:
        name: rsyslog_client
      vars:
        rsyslog_client_journald_persistent: false
      tags:
        - rsyslog

    - name: Install Zabbix agent
      ansible.builtin.import_tasks:
        file: tasks/zabbix-agent2.yml
      tags:
        - zabbix
