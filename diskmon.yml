---
- name: Play for Diskmonitor using Scrutiny
  hosts: diskmon
  remote_user: ansible
  gather_facts: true
  become: true

  vars_files:
    - host_vars/networks.yml

  handlers:
    - name: Restart handler tasks
      ansible.builtin.import_tasks:
        file: handlers/main.yml

  tasks:
    - name: Common Settings
      ansible.builtin.import_role:
        name: common
      vars:
        common_firewall: "{{ firewall }}"
        common_pkg: "{{ apt }}"
        common_install_users: true

    - name: "Configure Scrutiny"
      ansible.builtin.import_role:
        name: scrutiny_server
      vars:
        scrutiny_server_mail_address: "{{ scrutiny.mail.address }}"
        scrutiny_server_mail_app_passwd: "{{ scrutiny.mail.app_passwd }}"
        scrutiny_server_mail_smtp_server: "smtp.gmail.com"
        scrutiny_server_mail_smtp_port: "587"
        scrutiny_server_discord_webhook_id: "ID"
        scrutiny_server_discord_webhook_token: "TOKEN"
        docker_drive_is_opt_docker: true
        docker_btrfs: true
        docker_drive_uuid: "5603a159-0211-4591-8be0-f61ab1007c60"
        docker_users:
          - ansible
          - hayato
      tags:
        - scrutiny

    - name: APC UPS Settings
      ansible.builtin.import_role:
        name: apcupsd
      vars:
        apcupsd_role: "slave"
        apcupsd_timeout: 60
      tags:
        - apc
        - ups

    - name: "Configure Rsyslog"
      ansible.builtin.import_role:
        name: rsyslog_client
      vars:
        rsyslog_client_additional_actions: "{{ rsyslog.rsyslog_client_additional_actions }}"
        rsyslog_client_journald_persistent: false
      tags:
        - rsyslog

    - name: Install Zabbix agent
      ansible.builtin.import_tasks:
        file: tasks/zabbix-agent2.yml
      tags:
        - zabbix

    - name: "Set Swappiness"
      community.general.ini_file:
        path: "/etc/sysctl.d/99-swappiness.conf"
        option: "vm.swappiness"
        value: "{{ swappiness }}"
        state: present
        no_extra_spaces: true
        mode: "644"
      notify: "swappiness sysctl"
      tags:
        - swap

    - name: "Install BorgBackup and Configuration Backup"
      ansible.builtin.import_role:
        name: borg
      vars:
        borg_device: "/mnt/backup/Service_Backups/diskmon"
        borg_sources:
          - src: influxdb
            dest: influxdb
          - src: scrutiny_influxdb
            dest: scrutiny_influxdb
      tags:
        - borg

    - name: Install/Config Zramswap
      ansible.builtin.import_role:
        name: zramswap
      tags:
        - zram
