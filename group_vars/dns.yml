---
apt:
  - htop

dnsmasq_domain: hayaworld.home
dnsmasq_local: /hayaworld.home/
dnsmasq_dns_cache_size: 4000
dnsmasq_logs_log_facility: local5
dnsmasq_logs_log_to: "log.hayaworld.home"

pihole_port: 5353

firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "Zabbix from Zabbix-server"
        proto: "tcp"
        src: "192.168.88.106/24"
        port: "10050"
      - name: "DNS from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: "53"
      - name: "DNS(UDP) from service line"
        proto: "udp"
        src: "192.168.88.0/24"
        port: "53"
      - name: "DNS from service line"
        proto: "tcp"
        src: "172.16.0.0/12"
        port: "53"
      - name: "DNS(UDP) from service line"
        proto: "udp"
        src: "172.16.0.0/12"
        port: "53"
      - name: "DHCP from service line"
        proto: "udp"
        src: "0.0.0.0/0"
        port: "67"
      - name: "DHCP Client from service line"
        proto: "udp"
        src: "0.0.0.0/0"
        port: "68"
      - name: "Runner Docker ssh"
        proto: "tcp"
        src: "172.17.0.0/16"
        port: "22"
      - name: "Allow from rui (Kea DHCP peer)"
        src: "192.168.88.100"
      - name: "Allow from qd (Kea DHCP peer)"
        src: "192.168.88.200"
    ipv6:
      - name: "DNS from service line(IPv6/LinkLocal)"
        proto: "tcp"
        src: "fe80::/16"
        port: "53"
      - name: "DNS(UDP) from service line(IPv6/LinkLocal)"
        proto: "udp"
        src: "fe80::/16"
        port: "53"
      - name: "DHCPv6 from service line"
        proto: "udp"
        src: "::/0"
        port: "547"
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::/0"
        port: "546"

rsyslog_client_additional_actions: |
  if $programname startswith 'snmpd' then {
    if ($msg contains '192.168.88.124') then {
        stop
    }
  }
  if ($msg contains "COMMAND_RECEIVED Received command") then {
    stop
  }
