---
firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "Allow k8s nodes"
        src: "192.168.88.131"
      - name: "Allow k8s nodes"
        src: "192.168.88.132"
      - name: "Allow k8s nodes"
        src: "192.168.88.133"
      - name: "Allow funnel"
        src: "10.244.0.0/16"
      - name: "K8s API Server from Service Line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: "6443"
      - name: "K8s API Server from ISP shared"
        proto: "tcp"
        src: "100.64.0.0/10"
        port: "6443"
    ipv6:
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::"
        port: "546"

rsyslog:
  rsyslog_client_additional_actions: |
    if ($msg contains "Attempting to mount") or
       ($msg contains "enabling forceuid mount option implicitly") or
       ($msg contains "enabling forcegid mount option implicitly") then {
        stop
    }
