apt:
  - cron

firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "SSH from ISP Shared line"
        proto: "tcp"
        src: "100.64.0.0/10"
        port: '22'
      - name: "DNS server(TCP)"
        proto: "tcp"
        src: "0.0.0.0/0"
        port: "53"
      - name: "DNS server(UDP)"
        proto: "udp"
        src: "0.0.0.0/0"
        port: "53"
      - name: "HTTP server"
        proto: "tcp"
        src: "0.0.0.0/0"
        port: "80"
      - name: "Zabbix from Zabbix-server"
        proto: "tcp"
        src: "192.168.88.106/24"
        port: "10050"
    ipv6:
      - name: "DNS server(TCP)"
        proto: "tcp"
        src: "::"
        port: "53"
      - name: "DNS server(UDP)"
        proto: "udp"
        src: "::"
        port: "53"
      - name: "HTTP server"
        proto: "tcp"
        src: "::"
        port: "80"

docker_config:
  log-driver: "syslog"
  log-opts:
    syslog-address: "unixgram:///dev/log"
    tag: "{% raw %}nextcloud-aio/{{.Name}}{% endraw %}"
    syslog-format: "rfc3164"
