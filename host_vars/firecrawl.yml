---
firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "Firecrawl server"
        proto: "tcp"
        src: "0.0.0.0/0"
        port: "3002"
    ipv6:
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::"
        port: "546"
      - name: "Firecrawl server"
        proto: "tcp"
        src: "::"
        port: "3002"

docker_drive_is_opt_docker: true
docker_btrfs: true
docker_drive_uuid: "5603a159-0211-4591-8be0-f61ab1007c60"
docker_users:
  - hayato
  - ansible
