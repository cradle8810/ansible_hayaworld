firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "HTTP server"
        proto: "tcp"
        src: "0.0.0.0/0"
        port: "8080"
    ipv6:
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::"
        port: "546"
      - name: "HTTP server"
        proto: "tcp"
        src: "::"
        port: "8080"

docker_drive_is_opt_docker: true
docker_btrfs: true
docker_drive_uuid: "5603a159-0211-4591-8be0-f61ab1007c60"
docker_config:
  ipv6: true
  ip6tables: true
  userland-proxy: false
  dns:
    - 192.168.88.100
    - 192.168.88.200
  fixed-cidr-v6: "fd25:5951:9b0d:1::/64"
  bip: "172.18.5.1/24"

docker_users:
  - hayato
  - ansible

borg_device: "/mnt/backup/Service_Backups/searxng"
borg_sources:
  - src: "/root/searxng/config/"
    dest: config
  - src: data
    dest: data
