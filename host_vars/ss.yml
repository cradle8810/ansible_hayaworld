firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "HTTP server"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: "80"
      - name: "HTTPS server"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: "443"
      - name: "Zabbix from Zabbix-server"
        proto: "tcp"
        src: "192.168.88.106/24"
        port: "10050"
    ipv6:
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::"
        port: "546"
      - name: "HTTP server"
        proto: "tcp"
        src: "fe80::/16"
        port: "80"
      - name: "HTTPS server"
        proto: "tcp"
        src: "fe80::/16"
        port: "443"

docker_config:
  ipv6: true
  ip6tables: true
  userland-proxy: false
  dns:
    - 192.168.88.100
    - 192.168.88.200
  fixed-cidr-v6: "fdc8:5030:176e::1/64"
  bip: "172.18.7.1/24"
