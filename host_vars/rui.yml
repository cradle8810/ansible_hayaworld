---
rui_info: "{{ network | selectattr('shortname', 'eq', 'rui') | first }}"
qd_info: "{{ network | selectattr('shortname', 'eq', 'qd') | first }}"

dnsmasq:
  domain: hayaworld.home
  local: /hayaworld.home/
  listen_address: "{{ rui_info.ipv4 }}"
  interface: "{{ rui_info.interface }}"
  dns:
    cache_size: 4000
  logs:
    log_facility: local5
    log_to: "log.hayaworld.home"

dhcp:
  interface: "{{ rui_info.interface }}"
  me:
    name: "rui"
    ipaddr: "{{ rui_info.ipv4 }}"
  search_domain: "hayaworld.home"
  lib_base: "/usr/lib/x86_64-linux-gnu/kea/hooks"
  peer4:
    - name: "qd"
      url: "http://{{ qd_info.ipv4 }}:8080/"
      role: "primary"
      auto-failover: true
    - name: "rui"
      url: "http://{{ rui_info.ipv4 }}:8080/"
      role: "standby"
      auto-failover: true
  peer6:
    - name: "qd"
      url: "http://{{ qd_info.ipv4 }}:8081/"
      role: "primary"
      auto-failover: true
    - name: "rui"
      url: "http://{{ rui_info.ipv4 }}:8081/"
      role: "standby"
      auto-failover: true
  ipv4:
    subnet: "192.168.88.0/24"
    pool: "192.168.88.21-192.168.88.99"
    ttl: "0xf0"
    gw: "{{ subnet.gw4 }}"
    dns: "{{ qd_info.ipv4 }},{{ rui_info.ipv4 }}"
    lease_db: "/var/lib/kea/kea-leases4.csv"

services_start:
  - rsyslog
  - ssh
  - systemd-journald

firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "Zabbix from Zabbix-server"
        proto: "tcp"
        src: "192.168.88.106/24"
        port: "10050"
      - name: "DNS from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: "53"
      - name: "DNS(UDP) from service line"
        proto: "udp"
        src: "192.168.88.0/24"
        port: "53"
      - name: "DHCP from service line"
        proto: "udp"
        src: "0.0.0.0/0"
        port: "67"
      - name: "DHCP Client from service line"
        proto: "udp"
        src: "0.0.0.0/0"
        port: "68"
      - name: "Runner Docker ssh"
        proto: "tcp"
        src: "172.17.0.0/16"
        port: "22"
      - name: "Allow from qd (Kea DHCP peer)"
        src: "192.168.88.200"
    ipv6:
      - name: "DNS from service line(IPv6/LinkLocal)"
        proto: "tcp"
        src: "fe80::/16"
        port: "53"
      - name: "DNS(UDP) from service line(IPv6/LinkLocal)"
        proto: "udp"
        src: "fe80::/16"
        port: "53"
      - name: "DHCPv6 from service line"
        proto: "udp"
        src: "::/0"
        port: "547"
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::/0"
        port: "546"

rsyslog_client_additional_actions: |
  if ($syslogfacility-text == 'local7') and
    ($msg contains "COMMAND_RECEIVED Received command 'ha-heartbeat'") then {
    stop
  }
  if ($msg contains "/run/systemd/journal/dev-log") then {
    stop
  }
