---
firewall:
  policy: deny
  allow_rules:
    ipv4:
      - name: "SSH from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '22'
      - name: "Zabbix from Zabbix-server"
        proto: "tcp"
        src: "192.168.88.106/24"
        port: "10050"
      - name: "Open-WebUI from service line"
        proto: "tcp"
        src: "192.168.88.0/24"
        port: '8080'
    ipv6:
      - name: "DHCPv6 Client from service line"
        proto: "udp"
        src: "::"
        port: "546"

zramswap:
  algo: lz4
  percent: 50

docker_config:
  default-address-pools:
    - base: "172.18.5.0/24"
      size: 28
  dns:
    - 192.168.88.100
    - 192.168.88.200
